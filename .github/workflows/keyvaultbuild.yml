name: PowerPlatformExportAndCommit

on:
  workflow_dispatch:
    inputs:
      export_solution_a:
        description: 'Export MoJ Shared Base'
        type: boolean
        default: true
      export_solution_b:
        description: 'Export MoJ Shared Automation'
        type: boolean
        default: false
      export_solution_c:
        description: 'Export LADMS Apps'
        type: boolean
        default: false
      version_bump:
        description: 'Version bump for all selected solutions (none = export and commit source only, no release created)'
        type: choice
        options:
          - none
          - patch
          - minor
          - major
          - custom
        default: none
      custom_version:
        description: 'Custom version e.g. 2.0.0.0 — only used when version bump is set to custom'
        type: string
        required: false

permissions:
  id-token: write
  contents: write

jobs:
  auth-export-unpack-commit:
    runs-on: ubuntu-latest
    environment: developer-dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Azure using the service principal credentials stored in GitHub Secrets
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Retrieve secrets from Key Vault
        id: keyvault
        uses: azure/CLI@v3
        with:
          inlineScript: |
            IFS=',' read -ra SECRET_NAMES <<< "${{ vars.KEYVAULT_SECRET_NAMES }}"
            for SECRET_NAME in "${SECRET_NAMES[@]}"; do
              SECRET_VALUE=$(az keyvault secret show --name "$SECRET_NAME" --vault-name ${{ secrets.AZURE_KEYVAULT_NAME }} --query value -o tsv)
              echo "::add-mask::$SECRET_VALUE"
              ENV_VAR=$(echo "$SECRET_NAME" | tr '-' '_' | tr '[:lower:]' '[:upper:]')
              echo "${ENV_VAR}=${SECRET_VALUE}" >> $GITHUB_ENV
            done

      - name: Confirm retrieved secrets
        run: |
          IFS=',' read -ra SECRET_NAMES <<< "${{ vars.KEYVAULT_SECRET_NAMES }}"
          COUNT=${#SECRET_NAMES[@]}
          echo "Successfully retrieved ${COUNT} secret(s) from Key Vault and transformed for use as environment variables:"
          for SECRET_NAME in "${SECRET_NAMES[@]}"; do
            ENV_VAR=$(echo "$SECRET_NAME" | tr '-' '_' | tr '[:lower:]' '[:upper:]')
            echo "  - ${SECRET_NAME} -> env.${ENV_VAR}"
          done

      - name: Install Power Platform CLI
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Export and unpack MoJ Shared Base
        id: export-a
        if: ${{ inputs.export_solution_a }}
        uses: ./.github/actions/export-solution
        with:
          solution_unique_name: ${{ vars.SOLUTION_A_UNIQUE_NAME }}
          environment_url: ${{ env.POWERPLATFORMDEVELOPERDEV_ENVIRONMENTURL }}
          client_id: ${{ env.POWERPLATFORMDEVELOPERDEV_CLIENTID }}
          client_secret: ${{ env.POWERPLATFORMDEVELOPERDEV_SECRET }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          version_bump: ${{ inputs.version_bump }}
          custom_version: ${{ inputs.custom_version }}

      - name: Export and unpack MoJ Shared Automation
        id: export-b
        if: ${{ inputs.export_solution_b }}
        uses: ./.github/actions/export-solution
        with:
          solution_unique_name: ${{ vars.SOLUTION_B_UNIQUE_NAME }}
          environment_url: ${{ env.POWERPLATFORMDEVELOPERDEV_ENVIRONMENTURL }}
          client_id: ${{ env.POWERPLATFORMDEVELOPERDEV_CLIENTID }}
          client_secret: ${{ env.POWERPLATFORMDEVELOPERDEV_SECRET }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          version_bump: ${{ inputs.version_bump }}
          custom_version: ${{ inputs.custom_version }}

      - name: Export and unpack LADMS Apps
        id: export-c
        if: ${{ inputs.export_solution_c }}
        uses: ./.github/actions/export-solution
        with:
          solution_unique_name: ${{ vars.SOLUTION_C_UNIQUE_NAME }}
          environment_url: ${{ env.POWERPLATFORMDEVELOPERDEV_ENVIRONMENTURL }}
          client_id: ${{ env.POWERPLATFORMDEVELOPERDEV_CLIENTID }}
          client_secret: ${{ env.POWERPLATFORMDEVELOPERDEV_SECRET }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          version_bump: ${{ inputs.version_bump }}
          custom_version: ${{ inputs.custom_version }}

      - name: Commit and push solution changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit — solutions are already up to date"
          else
            git commit -m "chore: export Power Platform solutions [skip ci]"
            git push
          fi

      - name: Tag and release MoJ Shared Base
        if: ${{ inputs.export_solution_a && inputs.version_bump != 'none' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.export-a.outputs.solution_version }}"
          TAG="${{ vars.SOLUTION_A_UNIQUE_NAME }}/v${VERSION}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "${{ vars.SOLUTION_A_UNIQUE_NAME }} v${VERSION}" \
            --notes "Automated export from Power Platform DEV environment." \
            "solutions/${{ vars.SOLUTION_A_UNIQUE_NAME }}/${{ vars.SOLUTION_A_UNIQUE_NAME }}_managed_${VERSION}.zip"

      - name: Tag and release MoJ Shared Automation
        if: ${{ inputs.export_solution_b && inputs.version_bump != 'none' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.export-b.outputs.solution_version }}"
          TAG="${{ vars.SOLUTION_B_UNIQUE_NAME }}/v${VERSION}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "${{ vars.SOLUTION_B_UNIQUE_NAME }} v${VERSION}" \
            --notes "Automated export from Power Platform DEV environment." \
            "solutions/${{ vars.SOLUTION_B_UNIQUE_NAME }}/${{ vars.SOLUTION_B_UNIQUE_NAME }}_managed_${VERSION}.zip"

      - name: Tag and release LADMS Apps
        if: ${{ inputs.export_solution_c && inputs.version_bump != 'none' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.export-c.outputs.solution_version }}"
          TAG="${{ vars.SOLUTION_C_UNIQUE_NAME }}/v${VERSION}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "${{ vars.SOLUTION_C_UNIQUE_NAME }} v${VERSION}" \
            --notes "Automated export from Power Platform DEV environment." \
            "solutions/${{ vars.SOLUTION_C_UNIQUE_NAME }}/${{ vars.SOLUTION_C_UNIQUE_NAME }}_managed_${VERSION}.zip"
