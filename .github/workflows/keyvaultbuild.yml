name: Access Azure Key Vault and pass secret to workflow

on:
  workflow_dispatch: 
permissions:
  id-token: write
  contents: read
jobs:
  get-secret:
    runs-on: ubuntu-latest
    environment: developer-dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Retrieve secret from Key Vault
        id: keyvault
        uses: azure/CLI@v1
        with:
          inlineScript: |
            IFS=',' read -ra SECRET_NAMES <<< "${{ vars.KEYVAULT_SECRET_NAMES }}"
            for SECRET_NAME in "${SECRET_NAMES[@]}"; do
              SECRET_VALUE=$(az keyvault secret show --name "$SECRET_NAME" --vault-name ${{ secrets.AZURE_KEYVAULT_NAME }} --query value -o tsv)
              echo "::add-mask::$SECRET_VALUE"
              ENV_VAR=$(echo "$SECRET_NAME" | tr '-' '_' | tr '[:lower:]' '[:upper:]')
              echo "${ENV_VAR}=${SECRET_VALUE}" >> $GITHUB_ENV
            done
            
      - name: Use retrieved secret
        run: |
          IFS=',' read -ra SECRET_NAMES <<< "${{ vars.KEYVAULT_SECRET_NAMES }}"
          COUNT=${#SECRET_NAMES[@]}
          echo "Successfully retrieved ${COUNT} secret(s) from Key Vault:"
          for SECRET_NAME in "${SECRET_NAMES[@]}"; do
            echo "  - ${SECRET_NAME}"
          done