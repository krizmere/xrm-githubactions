name: PowerPlatformBuild

on:
  workflow_dispatch:
    inputs:
      export_solution_a:
        description: 'Export MoJ Shared Base'
        type: boolean
        default: true
      export_solution_b:
        description: 'Export MoJ Shared Automation'
        type: boolean
        default: true
      export_solution_c:
        description: 'Export LADMS Apps'
        type: boolean
        default: true
      version_bump:
        description: 'Version bump for all selected solutions (none = export and commit source only, no release created)'
        type: choice
        options:
          - none (export only)
          - revision
          - patch
          - minor
          - major
        default: none (export only)
      export_config_data:
        description: Export Config Data
        type: boolean
        default: false

permissions:
  id-token: write
  contents: write

jobs:
  auth-export-unpack-commit:
    runs-on: ubuntu-latest
    environment: developer-dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Azure using the service principal credentials stored in GitHub Secrets
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_GITHUB_KEYVAULT_CLIENTID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Retrieve secrets from Key Vault
        uses: ./.github/actions/retrieve-keyvault-secrets
        with:
          secret_names: ${{ vars.KEYVAULT_SECRET_NAMES }}
          keyvault_name: ${{ secrets.AZURE_KEYVAULT_NAME }}

      - name: Install Power Platform CLI
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Export and unpack MoJ Shared Base
        id: export-a
        if: ${{ inputs.export_solution_a }}
        uses: ./.github/actions/export-solution
        with:
          solution_unique_name: ${{ vars.SOLUTION_A_UNIQUE_NAME }}
          environment_url: ${{ env.POWERPLATFORMDEVELOPERDEV_ENVIRONMENTURL }}
          client_id: ${{ env.POWERPLATFORMDEVELOPERDEV_CLIENTID }}
          client_secret: ${{ env.POWERPLATFORMDEVELOPERDEV_SECRET }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          version_bump: ${{ inputs.version_bump }}

      - name: Export and unpack MoJ Shared Automation
        id: export-b
        if: ${{ inputs.export_solution_b }}
        uses: ./.github/actions/export-solution
        with:
          solution_unique_name: ${{ vars.SOLUTION_B_UNIQUE_NAME }}
          environment_url: ${{ env.POWERPLATFORMDEVELOPERDEV_ENVIRONMENTURL }}
          client_id: ${{ env.POWERPLATFORMDEVELOPERDEV_CLIENTID }}
          client_secret: ${{ env.POWERPLATFORMDEVELOPERDEV_SECRET }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          version_bump: ${{ inputs.version_bump }}

      - name: Export and unpack LADMS Apps
        id: export-c
        if: ${{ inputs.export_solution_c }}
        uses: ./.github/actions/export-solution
        with:
          solution_unique_name: ${{ vars.SOLUTION_C_UNIQUE_NAME }}
          environment_url: ${{ env.POWERPLATFORMDEVELOPERDEV_ENVIRONMENTURL }}
          client_id: ${{ env.POWERPLATFORMDEVELOPERDEV_CLIENTID }}
          client_secret: ${{ env.POWERPLATFORMDEVELOPERDEV_SECRET }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          version_bump: ${{ inputs.version_bump }}

      - name: Commit and push solution changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit — solutions are already up to date"
          else
            git commit -m "chore: export Power Platform solutions [skip ci]"
            git push
          fi

      - name: Tag and release selected solutions
        if: ${{ inputs.version_bump != 'none (export only)' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          declare -A SOLUTIONS
          [[ "${{ inputs.export_solution_a }}" == "true" ]] && SOLUTIONS["${{ vars.SOLUTION_A_UNIQUE_NAME }}"]="${{ steps.export-a.outputs.solution_version }}"
          [[ "${{ inputs.export_solution_b }}" == "true" ]] && SOLUTIONS["${{ vars.SOLUTION_B_UNIQUE_NAME }}"]="${{ steps.export-b.outputs.solution_version }}"
          [[ "${{ inputs.export_solution_c }}" == "true" ]] && SOLUTIONS["${{ vars.SOLUTION_C_UNIQUE_NAME }}"]="${{ steps.export-c.outputs.solution_version }}"

          for SOLUTION_NAME in "${!SOLUTIONS[@]}"; do
            VERSION="${SOLUTIONS[$SOLUTION_NAME]}"
            TAG="${SOLUTION_NAME}/v${VERSION}"
            git tag "$TAG"
            git push origin "$TAG"
            gh release create "$TAG" \
              --title "${SOLUTION_NAME} v${VERSION}" \
              --notes "Automated export from Power Platform DEV environment." \
              "solutions/${SOLUTION_NAME}/${SOLUTION_NAME}_managed_${VERSION}.zip"
          done

      - name: Export configuration data
        if: ${{ inputs.export_config_data }}
        uses: ./.github/actions/export-config-data
        with:
          schema_file: data/config/schema.xml
          gh_token: ${{ github.token }}
