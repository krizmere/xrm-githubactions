name: PowerPlatformDeploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target deployment environment
        type: choice
        required: true
        options:
          - sit
          - uat
          - dm
          - preprod
          - prod
      deploy_solution_a:
        description: Deploy MoJ Shared Base
        type: boolean
        default: true
      deploy_solution_b:
        description: Deploy MoJ Shared Automation
        type: boolean
        default: true
      deploy_solution_c:
        description: Deploy LADMS Apps
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Validate at least one solution is selected
        run: |
          if [[ "${{ inputs.deploy_solution_a }}" == "false" &&
                "${{ inputs.deploy_solution_b }}" == "false" &&
                "${{ inputs.deploy_solution_c }}" == "false" ]]; then
            echo "Error: at least one solution must be selected"
            exit 1
          fi

  deploy:
    needs: validate-inputs
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_GITHUB_KEYVAULT_CLIENTID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Retrieve secrets from Key Vault
        uses: ./.github/actions/retrieve-keyvault-secrets
        with:
          secret_names: ${{ vars.KEYVAULT_SECRET_NAMES }}
          keyvault_name: ${{ secrets.AZURE_KEYVAULT_NAME }}

      - name: Install Power Platform CLI
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Deploy MoJ Shared Base
        if: ${{ inputs.deploy_solution_a }}
        uses: ./.github/actions/deploy-solution
        with:
          solution_unique_name: ${{ vars.SOLUTION_A_UNIQUE_NAME }}
          environment_url: ${{ env.PP_ENV_URL }}
          client_id: ${{ env.PP_APP_CLIENTID }}
          client_secret: ${{ env.PP_APP_SECRET }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          gh_token: ${{ github.token }}

      - name: Deploy MoJ Shared Automation
        if: ${{ inputs.deploy_solution_b }}
        uses: ./.github/actions/deploy-solution
        with:
          solution_unique_name: ${{ vars.SOLUTION_B_UNIQUE_NAME }}
          environment_url: ${{ env.PP_ENV_URL }}
          client_id: ${{ env.PP_APP_CLIENTID }}
          client_secret: ${{ env.PP_APP_SECRET }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          gh_token: ${{ github.token }}

      - name: Deploy LADMS Apps
        if: ${{ inputs.deploy_solution_c }}
        uses: ./.github/actions/deploy-solution
        with:
          solution_unique_name: ${{ vars.SOLUTION_C_UNIQUE_NAME }}
          environment_url: ${{ env.PP_ENV_URL }}
          client_id: ${{ env.PP_APP_CLIENTID }}
          client_secret: ${{ env.PP_APP_SECRET }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          gh_token: ${{ github.token }}
