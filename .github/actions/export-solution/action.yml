name: Export and Unpack Power Platform Solution
description: Exports a managed solution from Power Platform, bumps version, repacks, and publishes as artifact

inputs:
  solution_unique_name:
    description: The unique name of the solution to export
    required: true
  environment_url:
    description: The URL of the Power Platform environment
    required: true
  client_id:
    description: Application (client) ID for authentication
    required: true
  client_secret:
    description: Client secret for authentication
    required: true
  tenant_id:
    description: Azure AD tenant ID for authentication
    required: true
  version_bump:
    description: 'Version bump type: none (export only), patch, minor, or major'
    required: false
    default: none (export only)

outputs:
  solution_version:
    description: The final solution version after any bump
    value: ${{ steps.version.outputs.solution_version }}

runs:
  using: composite
  steps:
    - name: Authenticate with Power Platform
      shell: bash
      run: |
        pac auth create \
          --environment "${{ inputs.environment_url }}" \
          --applicationId "${{ inputs.client_id }}" \
          --clientSecret "${{ inputs.client_secret }}" \
          --tenant "${{ inputs.tenant_id }}" \
          --accept-cleartext-caching

    - name: Export managed solution
      shell: bash
      run: |
        mkdir -p "solutions/${{ inputs.solution_unique_name }}"
        pac solution export \
          --name "${{ inputs.solution_unique_name }}" \
          --path "solutions/${{ inputs.solution_unique_name }}/${{ inputs.solution_unique_name }}_export.zip" \
          --managed true \
          --overwrite true

    - name: Unpack solution to source
      shell: bash
      run: |
        pac solution unpack \
          --zipfile "solutions/${{ inputs.solution_unique_name }}/${{ inputs.solution_unique_name }}_export.zip" \
          --folder "solutions/${{ inputs.solution_unique_name }}/src" \
          --packagetype Managed \
          --allowWrite true \
          --allowDelete true

    - name: Compute and apply version bump
      id: version
      shell: bash
      run: |
        SOLUTION_XML="solutions/${{ inputs.solution_unique_name }}/src/Other/Solution.xml"
        CURRENT_VERSION=$(grep -oP '(?<=<Version>)[^<]+' "$SOLUTION_XML" 2>/dev/null || echo "1.0.0.0")

        IFS='.' read -ra V <<< "$CURRENT_VERSION"
        MAJOR=${V[0]:-1}; MINOR=${V[1]:-0}; BUILD=${V[2]:-0}; REVISION=${V[3]:-0}

        case "${{ inputs.version_bump }}" in
          major)  MAJOR=$((MAJOR+1)); MINOR=0; BUILD=0; REVISION=0 ;;
          minor)  MINOR=$((MINOR+1)); BUILD=0; REVISION=0 ;;
          patch)  BUILD=$((BUILD+1)); REVISION=0 ;;
          "none (export only)") NEW_VERSION="$CURRENT_VERSION" ;;
          *)      NEW_VERSION="$CURRENT_VERSION" ;;
        esac

        if [ "${{ inputs.version_bump }}" != "none (export only)" ]; then
          NEW_VERSION="${MAJOR}.${MINOR}.${BUILD}.${REVISION}"
        fi

        echo "Current version : $CURRENT_VERSION"
        echo "New version     : $NEW_VERSION"

        if [ "$NEW_VERSION" != "$CURRENT_VERSION" ]; then
          sed -i "s|<Version>${CURRENT_VERSION}</Version>|<Version>${NEW_VERSION}</Version>|" "$SOLUTION_XML"
          echo "Updated Solution.xml to $NEW_VERSION"
        fi

        echo "solution_version=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Update solution version in Power Platform environment
      if: ${{ inputs.version_bump != 'none (export only)' }}
      shell: bash
      run: |
        pac solution online-version \
          --solution-name "${{ inputs.solution_unique_name }}" \
          --solution-version "${{ steps.version.outputs.solution_version }}"

    - name: Repack solution with updated version
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.solution_version }}"
        pac solution pack \
          --zipfile "solutions/${{ inputs.solution_unique_name }}/${{ inputs.solution_unique_name }}_managed_${VERSION}.zip" \
          --folder "solutions/${{ inputs.solution_unique_name }}/src" \
          --packagetype Managed

    - name: Remove raw export zip
      shell: bash
      run: rm "solutions/${{ inputs.solution_unique_name }}/${{ inputs.solution_unique_name }}_export.zip"

    - name: Publish solution zip as workflow artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.solution_unique_name }}_managed_${{ steps.version.outputs.solution_version }}
        path: solutions/${{ inputs.solution_unique_name }}/${{ inputs.solution_unique_name }}_managed_${{ steps.version.outputs.solution_version }}.zip
        retention-days: 90
