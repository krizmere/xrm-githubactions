name: Import Configuration Migration Data
description: Downloads the latest config data release artifact and imports it into the target Power Platform environment

inputs:
  environment_url:
    description: The URL of the target Power Platform environment
    required: true
  client_id:
    description: Application (client) ID for authentication
    required: true
  client_secret:
    description: Client secret for authentication
    required: true
  tenant_id:
    description: Azure AD tenant ID for authentication
    required: true
  gh_token:
    description: GitHub token for reading releases and downloading artifacts
    required: true

runs:
  using: composite
  steps:
    - name: Authenticate with Power Platform
      shell: bash
      run: |
        pac auth create \
          --environment "${{ inputs.environment_url }}" \
          --applicationId "${{ inputs.client_id }}" \
          --clientSecret "${{ inputs.client_secret }}" \
          --tenant "${{ inputs.tenant_id }}" \
          --accept-cleartext-caching

    - name: Resolve latest config data release
      id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
      run: |
        LATEST_TAG=$(gh release list --limit 100 --json tagName,createdAt \
          | jq -r '[.[] | select(.tagName | startswith("config-data/"))] | sort_by(.createdAt) | last | .tagName')

        if [[ -z "$LATEST_TAG" || "$LATEST_TAG" == "null" ]]; then
          echo "Warning: no config-data release found — skipping data import"
          echo "tag=" >> $GITHUB_OUTPUT
        else
          echo "Resolved latest config data release: $LATEST_TAG"
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
        fi

    - name: Download config data artifact
      if: ${{ steps.resolve.outputs.tag != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
      run: |
        gh release download "${{ steps.resolve.outputs.tag }}" \
          --pattern "config-data.zip" \
          --dir .

    - name: Import configuration data
      if: ${{ steps.resolve.outputs.tag != '' }}
      shell: bash
      run: |
        pac data import --data config-data.zip
